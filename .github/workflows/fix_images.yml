name: Fix Images — Une seule fois
on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Corriger les images via Claude + Pexels + Unsplash
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          UNSPLASH_API_KEY: ${{ secrets.UNSPLASH_API_KEY }}
        run: python3 fix_images.py

      - name: Commit et push
        run: |
          git config --global user.name 'Robot SEO — Le Club Sans Gluten'
          git config --global user.email 'bot@leclubsansgluten.com'
          git add .
          git commit -m "🖼️ Fix images — $(date +%Y-%m-%d)" || echo "Rien à commiter"
          git push
